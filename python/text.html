<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Simple Memo</title>
    <style>
        body { padding: 15px; font-family: sans-serif; background-color: #f1f5f9; }
        textarea { width: 100%; height: 180px; box-sizing: border-box; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 14px; }
        .btn-container { margin-top: 10px; display: flex; gap: 10px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-save { background-color: #3b82f6; color: white; }
        .btn-load { background-color: #64748b; color: white; }
    </style>
</head>
<body>

    <textarea id="memoArea" placeholder="여기에 메모를 작성하세요..."></textarea>
    
    <div class="btn-container">
        <button class="btn-save" onclick="saveMemo()">저장하기</button>
        <button class="btn-load" onclick="loadMemo()">불러오기</button>
    </div>

    <script>
        // 1. 메모 저장 기능 (파이썬의 save_note 호출)
        function saveMemo() {
            const textValue = document.getElementById('memoArea').value;
            
            // pywebview가 주입해준 pywebview.api 객체를 사용합니다.
            pywebview.api.save_note(textValue).then(function(response) {
                alert("메모가 저장되었습니다!\n경로: " + response.path);
            }).catch(function(error) {
                console.error("저장 실패:", error);
            });
        }

        // 2. 메모 불러오기 기능 (파이썬의 load_note 호출)
        function loadMemo() {
            pywebview.api.load_note().then(function(response) {
                document.getElementById('memoArea').value = response.text;
                alert("메모를 성공적으로 불러왔습니다!");
            }).catch(function(error) {
                alert("불러올 메모 파일이 없거나 에러가 발생했습니다.");
            });
        }
    </script>

</body>
</html>
